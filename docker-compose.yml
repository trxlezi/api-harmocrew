services:
  postgres:
    image: postgres:16-alpine
    container_name: harmocrew-postgres
    environment:
      POSTGRES_DB: harmocrew
      POSTGRES_USER: harmocrew
      POSTGRES_PASSWORD: harmocrew
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmocrew -d harmocrew"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
